name: Dev Plan Terraform

on:
  pull_request:
    branches: [ main ]
    paths:
    - 'terraform/env/**'
    - 'terraform/live/**'
    - 'terraform/modules/**'
    - 'dev-tf-plan.yaml'

permissions:
  contents: read
  pull-requests: write
  id-token: write   # for OIDC

jobs:
  plan:
    runs-on: ubuntu-latest
    environment: dev
    steps:
    - uses: actions/checkout@v4

    - uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ vars.AWS_ROLE_ARN }}
        aws-region: eu-west-1

    - uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.11.0

    - name: Init
      run: |
        terraform -chdir=terraform/live init \
          -backend-config=../env/dev.backend.common.hcl \
          -backend-config=key=rewards/terraform.tfstate

    - name: Select workspace
      run: terraform -chdir=terraform/live workspace select -or-create dev

    - name: Fmt
      id: fmt
      run: terraform -chdir=terraform/live fmt -check -recursive
      continue-on-error: true

    - name: Validate
      id: validate
      run: terraform -chdir=terraform/live validate -no-color

    - name: Plan
      id: plan
      run: |
        terraform -chdir=terraform/live plan \
          -no-color \
          -input=false \
          -out=tfplan \
          -var-file=../env/dev.common.tfvars \
          -var-file=../env/dev.live.tfvars
      continue-on-error: true

    - name: Comment plan on PR
      uses: actions/github-script@v7
      env:
        PLAN_STDOUT: ${{ steps.plan.outputs.stdout }}
      with:
        script: |
          const body = `### Terraform Plan — \`dev\`
          
          - fmt: \`${{ steps.fmt.outcome }}\`
          - validate: \`${{ steps.validate.outcome }}\`
          - plan: \`${{ steps.plan.outcome }}\`
          
          <details><summary>Show plan</summary>
          
          \`\`\`hcl
          ${process.env.PLAN_STDOUT}
          \`\`\`
          
          </details>
          
          *Triggered by @${{ github.actor }} on \`${{ github.sha }}\`*`;
          
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });
          const existing = comments.find(c =>
            c.user.type === 'Bot' && c.body.includes('Terraform Plan — `dev`')
          );
          
          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner, repo: context.repo.repo,
              comment_id: existing.id, body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, body,
            });
          }

    - name: Fail if plan errored
      if: steps.plan.outcome == 'failure'
      run: exit 1
