---
# Dynamic EC2 inventory for the dev environment.
# Cloning this file (e.g. inventories/prod.aws_ec2.yaml with tag:environment: prod)
# gives prod the same shape — the playbook and role stay unchanged.
plugin: amazon.aws.aws_ec2

regions:
  - eu-west-1

filters:
  tag:service: rewards
  tag:environment: dev
  instance-state-name: running

hostnames:
  - instance-id

# Run over SSM so we don't need SSH or public IPs.
# Per-host facts are composed from instance tags so the role stays env-neutral.
compose:
  ansible_host: instance_id
  ansible_connection: '"amazon.aws.aws_ssm"'
  ansible_aws_ssm_region: placement.region
  ansible_aws_ssm_bucket_name: lookup('env', 'ANSIBLE_SSM_BUCKET')
  ansible_python_interpreter: '"/usr/bin/python3"'
  rewards_environment: tags.environment
  rewards_service: tags.service

# Group hosts by their service tag — produces a `rewards` group that the
# playbook targets. Tag filter already constrains membership to this env.
groups:
  rewards: tags.service == 'rewards'

strict: false
