---
- name: Install systemd unit
  ansible.builtin.template:
    src: rewards.service.j2
    dest: "/etc/systemd/system/{{ rewards_service_name }}.service"
    owner: root
    group: root
    mode: "0644"
  notify:
    - rewards_systemd_reload
    - rewards_restart

- name: Enable and start rewards service
  ansible.builtin.systemd:
    name: "{{ rewards_service_name }}"
    enabled: true
    state: started
    daemon_reload: true
