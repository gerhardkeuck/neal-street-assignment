---
# The security group already restricts the app port to the VPC; this is a
# defence-in-depth host-level firewall. Skipped unless rewards_configure_firewall
# is true to keep cost/complexity low for the default dev setup.
- name: Ensure firewalld is running
  ansible.builtin.systemd:
    name: firewalld
    enabled: true
    state: started

- name: Permit app port from allowed CIDRs only
  ansible.posix.firewalld:
    rich_rule: "rule family=ipv4 source address={{ item }} port port={{ rewards_app_port }} protocol=tcp accept"
    permanent: true
    immediate: true
    state: enabled
  loop: "{{ rewards_firewall_allowed_cidrs }}"
  notify: rewards_firewalld_reload

- name: Drop app port from everywhere else
  ansible.posix.firewalld:
    port: "{{ rewards_app_port }}/tcp"
    permanent: true
    immediate: true
    state: disabled
  notify: rewards_firewalld_reload
