---
- name: Ensure application directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
  - { path: "{{ rewards_install_dir }}", owner: root, group: root, mode: "0755" }
  - { path: "{{ rewards_config_dir }}",  owner: root, group: "{{ rewards_group }}", mode: "0750" }
  - { path: "{{ rewards_log_dir }}",     owner: "{{ rewards_user }}", group: "{{ rewards_group }}", mode: "0755" }
